<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRD & Coinbase Wallet Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e1e3f;
            --btn-blue: #586cf5;
            --btn-gray: #515270;
            --text-white: #ffffff;
            --text-secondary: #b0b0cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* حاوية الشاشات */
        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* الشاشة الأولى: BRD Join */
        .logo-section {
            margin-bottom: 30px;
        }

        .coinbase-logo {
            width: 80px;
            height: 80px;
            background: #0052ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .coinbase-logo span {
            width: 30px;
            height: 30px;
            border: 6px solid white;
            border-radius: 4px;
        }

        .arrow-up {
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .brd-logo-img {
            width: 120px;
            height: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            padding: 0 20px;
            margin-bottom: 60px;
        }

        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 4px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-blue { background-color: var(--btn-blue); color: white; }
        .btn-gray { background-color: var(--btn-gray); color: white; }

        /* الشاشة الثانية: Recovery */
        .header-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-arrow { font-size: 24px; cursor: pointer; }
        .help-icon { 
            width: 22px; height: 22px; 
            border: 2px solid white; 
            border-radius: 50%; 
            font-size: 14px;
            display: flex; justify-content: center; align-items: center;
        }

        .recovery-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            padding: 10px;
        }

        .grid-item {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 15px 5px;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        hr {
            width: 100%;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 40px 0;
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="screen">
            <div class="logo-section">
                <div class="coinbase-logo">
                    <span></span>
                </div>
                <div class="arrow-up">↑</div>
                <img src="https://i.ibb.co/ymp5HL9C/F3-BB5708-18-B2-4-C3-F-89-D2-ADF914-D14-A9-E.png" alt="BRD" class="brd-logo-img">
            </div>

            <h1>BRD has joined<br>Coinbase Wallet!</h1>
            <p class="description">We're excited to announce that BRD is joining the Coinbase Wallet team.</p>

            <div class="button-group">
                <button class="btn btn-blue">Get Coinbase Wallet</button>
                <button class="btn btn-gray">View Press Release</button>
                <button class="btn btn-gray">Restore Wallet</button>
            </div>
        </div>

        <hr>

        <div class="screen">
            <div class="header-nav">
                <div class="back-arrow">←</div>
                <div class="help-icon">?</div>
            </div>

            <h1 style="font-size: 22px;">Récupérer votre portefeuille</h1>
            <p class="description" style="margin-bottom: 30px;">Veuillez saisir la phrase de récupération du portefeuille que vous souhaitez récupérer.</p>

            <div class="recovery-grid">
                <div class="grid-item">1</div><div class="grid-item">2</div><div class="grid-item">3</div>
                <div class="grid-item">4</div><div class="grid-item">5</div><div class="grid-item">6</div>
                <div class="grid-item">7</div><div class="grid-item">8</div><div class="grid-item">9</div>
                <div class="grid-item">10</div><div class="grid-item">11</div><div class="grid-item">12</div>
            </div>
        </div>

    </div>

</body>
</html>
