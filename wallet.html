<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Interface</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .top-header { position: fixed; top: 0; width: 100%; padding: 15px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { width: 35px; height: 35px; background: purple; border-radius: 8px; }
        .btn-connect { background: linear-gradient(90deg, #3b82f6, #8b5cf6); border: none; color: #fff; padding: 8px 20px; border-radius: 20px; font-weight: bold; }
        .screen-title { font-size: 24px; margin-top: 80px; }
        .btn-main { background: #fff; color: #000; width: 100%; padding: 15px; border-radius: 30px; border: none; font-size: 18px; margin-top: 50px; cursor: pointer; }
        .btn-alt { background: transparent; color: #fff; width: 100%; padding: 15px; border: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-header">
        <div class="logo-box"></div>
        <button class="btn-connect">Connecter</button>
    </div>
    <div class="app-container">
        <img src="https://i.ibb.co/0ptqGxqv/63-EDB01-A-F334-4276-9093-767375-F8-B16-B.png" width="120">
        <h1 class="screen-title">Votre plateforme pour<br>tout sur la blockchain</h1>
        <button class="btn-main">Créer un nouveau portefeuille</button>
        <button class="btn-alt">J'ai déjà un portefeuille</button>
    </div>
</body>
</html>
