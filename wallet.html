<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body style="background:#000;">
    <script>
        // هذا الكود يفتح نافذة جديدة بمقاسات الصورة التي أرفقتها (400x650)
        // بمجرد دخول الشخص على الرابط، ستنبثق النافذة الصغيرة
        window.onload = function() {
            const width = 400;
            const height = 650;
            const left = (screen.width / 2) - (width / 2);
            const top = (screen.height / 2) - (height / 2);
            
            const features = `width=${width},height=${height},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no,resizable=no`;
            
            // سيفتح ملفك الأصلي "wallet.html" داخل النافذة المنبثقة
            const newWindow = window.open('wallet.html', 'WalletPopup', features);
            
            if (newWindow) {
                // إغلاق الصفحة البيضاء الأساسية بعد فتح النافذة (اختياري)
                window.blur();
            } else {
                alert("Please allow pop-ups for this site");
            }
        };
    </script>
</body>
</html>
